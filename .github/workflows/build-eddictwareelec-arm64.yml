
name: Build EddictwareELEC (aarch64)

description: |
  CI workflow to build EddictwareELEC for RPi4 (aarch64) using the official build command.

on:
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner to use'
        required: false
        default: ubuntu-24.04
        type: choice
        options:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - self-hosted
          - self-hosted-sysbox
  # push:
  #   branches: [ master ]
  # pull_request:
  #   branches: [ master ]

jobs:

  build:
    runs-on: ${{ (github.event_name == 'workflow_dispatch' && (inputs.runner == 'self-hosted-sysbox' && fromJson('["self-hosted", "sysbox"]') || inputs.runner)) || 'ubuntu-24.04' }}
    steps:
      - id: checkout
        name: Checkout EddictwareELEC
        uses: actions/checkout@v4
        with:
          repository: Eddict/EddictwareELEC
          ref: master

      # - id: show_env
      #   name: Show disk space and environment
      #   run: |
      #     df -h
      #     uname -a
      #     lscpu
      #     free -h

      - id: build_image
        name: Build EddictwareELEC image
        run: |
          set -o pipefail
          BUILDUSER="runner"
          sudo -u "$BUILDUSER" bash -c 'cd "$PWD"; DISTRO=EddictwareELEC PROJECT=RPi DEVICE=RPi4 ARCH=aarch64 make -j$(nproc) -l$(nproc) image 2>&1 | sudo tee build.log' || tail -n 1000 build.log
          # (DISTRO=EddictwareELEC PROJECT=RPi DEVICE=RPi4 ARCH=aarch64 make -j$(nproc) -l$(nproc) image 2>&1 | tee build.log) || tail -n 1000 build.log
          # # BUILDUSER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          # if [ "$(id -u)" = 0 ]; then
          #   echo "Running as root, switching to $BUILDUSER for build."
          #   if id "$BUILDUSER" >/dev/null 2>&1; then
          #     echo "Ensuring $BUILDUSER owns the workspace..."
          #     chown -R "$BUILDUSER" "$PWD"
          #     sudo -u "$BUILDUSER" bash -c 'cd "$PWD"; DISTRO=EddictwareELEC PROJECT=RPi DEVICE=RPi4 ARCH=aarch64 make -j$(nproc) -l$(nproc) image 2>&1 | sudo tee build.log' || tail -n 1000 build.log
          #   else
          #     echo "User $BUILDUSER does not exist. Please create a non-root user for builds." >&2
          #     exit 1
          #   fi
          # else
          #   (DISTRO=EddictwareELEC PROJECT=RPi DEVICE=RPi4 ARCH=aarch64 make -j$(nproc) -l$(nproc) image 2>&1 | tee build.log) || tail -n 1000 build.log
          # fi

      - id: list_images
        name: List built images
        run: |
          ls -lh ./target/*.img* || true

      - id: upload_image
        name: Upload built image artifact
        uses: actions/upload-artifact@v4
        with:
          name: EddictwareELEC-RPi4-aarch64-image
          path: ./target/*.img*
          if-no-files-found: warn

      - id: upload_log
        name: Upload full build log
        uses: actions/upload-artifact@v4
        with:
          name: build.log
          path: build.log
          if-no-files-found: warn
